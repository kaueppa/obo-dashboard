<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obo Studio — Acesso</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-mark {
      width: 48px;
      height: 48px;
      background: #ff5722;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 20px;
      color: #fff;
      margin-bottom: 12px;
    }
    .logo h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .logo p { font-size: 13px; color: #666; margin-top: 4px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #ff5722; }
    button {
      width: 100%;
      padding: 13px;
      background: #ff5722;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    button:hover { background: #e64a19; }
    .error {
      display: none;
      background: #2a1010;
      border: 1px solid #ff3333;
      color: #ff6666;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">O</div>
      <h1>Obo Studio</h1>
      <p>Dashboard Operacional</p>
    </div>
    <form id="loginForm">
      <label>Usuário</label>
      <input type="text" id="user" placeholder="seu usuário" autocomplete="username" />
      <label>Senha</label>
      <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password" />
      <button type="submit">Entrar</button>
      <div class="error" id="error">Usuário ou senha incorretos.</div>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = document.getElementById('user').value.trim();
      const pass = document.getElementById('pass').value;
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user, pass })
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        document.getElementById('error').classList.add('show');
      }
    });
  </script>
</body>
</html>
